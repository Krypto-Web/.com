<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dexo Homes | Luxury Real Estate Nigeria</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DEXO<span>HOMES</span></div>
        <ul class="nav-links">
            <li><a href="#">Buy</a></li>
            <li><a href="#">Rent</a></li>
            <li><a href="#">Short Let</a></li>
            <li><a href="#" class="btn-gold">List Property</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 class="reveal">Find Your <span class="gold-text">Masterpiece.</span></h1>
            <p class="reveal">The most exclusive real estate portfolio in Lagos and Abuja.</p>
            
            <div class="search-container glass">
                <input type="text" placeholder="Location...">
                <select>
                    <option>Property Type</option>
                    <option>Duplex</option>
                </select>
                <button class="search-btn">Search</button>
            </div>
        </div>
    </section>

    <section class="properties">
        <h2 class="section-title">Featured Listings</h2>
        <div class="grid" id="property-grid">
            <div class="card glass-card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1613490493576-7fde63acd811?q=80&w=2071&auto=format&fit=crop');">
                    <span class="tag">For Sale</span>
                </div>
                <div class="card-info">
                    <h3>₦750,000,000</h3>
                    <p class="location">Banana Island, Ikoyi</p>
                    <div class="details">
                        <span>🛏 5 Beds</span> <span>🛁 6 Baths</span>
                    </div>
                    <button class="view-btn">View Details</button>
                </div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/234000000000" class="whatsapp-float" target="_blank">
        <span>Connect with Concierge</span>
    </a>

    <script src="script.js"></script>
</body>
</html>
